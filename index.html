<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; connect-src 'self'; object-src 'none'; base-uri 'none'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>びくたん</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="bubble" aria-live="polite"></div>
    <div id="pomodoro-quick" aria-label="ポモドーロを始める">
      <span class="pomodoro-quick-label">集中する？</span>
      <button type="button" data-phase="focus15" aria-label="15分作業を始める">15</button>
      <button type="button" data-phase="focus25" aria-label="25分作業を始める">25</button>
      <button type="button" data-phase="focus90" aria-label="90分作業を始める">90</button>
    </div>
    <button id="sound-toggle" type="button" aria-label="びくたんの音をミュート" aria-pressed="false">🔊</button>
    <canvas id="stage"></canvas>
    <div id="status">読み込み中…</div>
    <script src="vendor/live2dcubismcore.min.js"></script>
    <script src="node_modules/pixi.js/dist/browser/pixi.min.js"></script>
    <script src="node_modules/@pixi/unsafe-eval/dist/browser/unsafe-eval.min.js"></script>
    <script src="node_modules/pixi-live2d-display/dist/cubism4.min.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
