<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'" />
    <title>Claude APIキー設定</title>
    <style>
      body {
        font-family: -apple-system, "Hiragino Sans", sans-serif;
        margin: 0;
        padding: 20px 24px;
        background: #f7f4ef;
        color: #3a342c;
        font-size: 13px;
      }
      h1 { font-size: 15px; margin: 0 0 10px; }
      p.note { margin: 0 0 12px; color: #7a7062; font-size: 11.5px; line-height: 1.5; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
        border: 1px solid #cfc6b8;
        border-radius: 8px;
        background: #fff;
      }
      .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
      button {
        padding: 7px 16px;
        font-size: 13px;
        border-radius: 8px;
        border: 1px solid #cfc6b8;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #b3593b;
        border-color: #b3593b;
        color: #fff;
      }
      #status { min-height: 16px; margin-top: 8px; font-size: 11.5px; color: #7a7062; }
    </style>
  </head>
  <body>
    <h1>Claude APIキー</h1>
    <p class="note">
      Anthropic Console で発行した API キー（sk-ant-…）を入力してください。<br />
      キーはこの Mac の設定ファイル（state.json）に平文で保存されます。共有マシンでは注意してください。
    </p>
    <input id="api-key" type="password" placeholder="sk-ant-api03-…" autofocus />
    <div id="status"></div>
    <div class="row">
      <button id="cancel">キャンセル</button>
      <button id="save" class="primary">保存</button>
    </div>
    <script src="apikey.js"></script>
  </body>
</html>
